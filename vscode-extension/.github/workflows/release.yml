name: VSCode Extension Release

on:
  push:
    tags:
      - 'vscode-ext-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., vscode-ext-v0.1.0)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        working-directory: vscode-extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npm run compile

      - name: Package Extension
        working-directory: vscode-extension
        run: |
          VERSION=${{ github.event.inputs.tag || github.ref_name }}
          VERSION=${VERSION#vscode-ext-v}
          npm run package -- --version $VERSION

      - name: Publish to Open VSX
        working-directory: vscode-extension
        run: |
          npx ovsx publish vscode-extension/*.vsix -p ${{ secrets.OVSX_TOKEN }} || true

      - name: Publish to VS Code Marketplace
        working-directory: vscode-extension
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          release_name: PR Insight VSCode Extension ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false

  release-assets:
    runs-on: ubuntu-latest
    needs: release
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: pr-insight-vscode

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.release.outputs.upload_url }}
          asset_path: ${{ matrix.artifact }}
          asset_name: pr-insight-vscode.vsix
          asset_content_type: application/vsix
